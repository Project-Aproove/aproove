<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <style>
      .wm { font-family: 'Raleway', 'Arial', sans-serif; font-weight: 200; }
      .bb { font-family: 'Raleway', 'Arial', sans-serif; font-weight: 900; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="400" height="480" fill="#0A0A10"/>
  <!-- Expansion lines -->
  <g opacity="0.18" stroke="#F5A623" stroke-linecap="round">
    <line x1="200" y1="200" x2="200" y2="20"  stroke-width="1.5"/>
    <line x1="200" y1="200" x2="200" y2="380" stroke-width="1.5"/>
    <line x1="200" y1="200" x2="20"  y2="200" stroke-width="1.5"/>
    <line x1="200" y1="200" x2="380" y2="200" stroke-width="1.5"/>
    <line x1="200" y1="200" x2="54"  y2="54"  stroke-width="1"/>
    <line x1="200" y1="200" x2="346" y2="54"  stroke-width="1"/>
    <line x1="200" y1="200" x2="54"  y2="346" stroke-width="1"/>
    <line x1="200" y1="200" x2="346" y2="346" stroke-width="1"/>
  </g>
  <!-- B solid -->
  <text x="108" y="295" class="bb" font-size="160" fill="#F5A623">B</text>
  <!-- B mirrored -->
  <g transform="translate(400,0) scale(-1,1)">
    <text x="108" y="295" class="bb" font-size="160" fill="#F5A623" opacity="0.28">B</text>
  </g>
  <!-- Wordmark -->
  <text x="200" y="430" class="wm" font-size="52" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">BBrain</text>
</svg>
